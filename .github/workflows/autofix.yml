name: Autofix

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install "ruff>=0.4"

      # ✅ Исправлено: пути backend/ вместо app/ и tests/
      - name: Run Ruff Check (Fixable errors)
        run: ruff check --fix backend/
        continue-on-error: true

      - name: Run Ruff Format
        run: ruff format backend/

      # ✅ Опционально: проверяем, есть ли изменения перед коммитом
      - name: Check for changes
        id: git-check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.git-check.outputs.changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: ruff autofix + format"
          file_pattern: "backend/**/*"
