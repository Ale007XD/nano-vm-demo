version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nano-vm-backend
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN:-}
      - DEMO_MODE=${DEMO_MODE:-true}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
    expose:
      - "8000"
    networks:
      - nano-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: nano-vm-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nano-net

networks:
  nano-net:
    driver: bridge
